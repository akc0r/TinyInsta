name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: check --output-format=github

  contract-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e "libs[django]"
      # Build-time event-contract gate: every event type has a registered schema.
      - name: Verify event contracts
        run: python -c "from tinyinsta.events import registry; registry.assert_complete(); print('event contracts OK')"

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install hometimeline-svc + test deps
        run: |
          pip install -e "libs[django]"
          pip install -r services/hometimeline-svc/requirements-dev.txt
      - name: Run fan-out test suite
        working-directory: services/hometimeline-svc
        run: pytest -q

  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm exec prettier --check "**/*.{ts,tsx}"

  build-images:
    runs-on: ubuntu-latest
    needs: [lint-python]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-svc
          - post-svc
          - usertimeline-svc
          - hometimeline-svc
          - interaction-svc
          - stories-svc
          - media-svc
          - media-worker
          - search-svc
          - realtime-svc
          - ranking-svc
          - messaging-svc
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Publish to GHCR only on pushes to main; PRs just verify the build.
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          # Build context is the repo root so images can bundle libs/ (see Dockerfiles).
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository_owner }}/tinyinsta-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
