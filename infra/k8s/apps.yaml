# HTTP services. Each: Deployment (1 replica) + ClusterIP Service on :8000.
# Images are the locally-built compose images (tinyinsta/<svc>) — load them into
# the cluster first (see README), or override with `kustomize edit set image`.
# Common env comes from the ConfigMap + Secret; SERVICE_NAME is per pod.
#
# This file defines user-svc, post-svc, usertimeline-svc, hometimeline-svc,
# interaction-svc, stories-svc, media-svc, search-svc and realtime-svc following
# one shared shape; only image, SERVICE_NAME and Service name differ.
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: user-svc, namespace: tinyinsta }
spec:
  replicas: 1
  selector: { matchLabels: { app: user-svc } }
  template:
    metadata: { labels: { app: user-svc } }
    spec:
      containers:
        - name: app
          image: tinyinsta/user-svc:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: { name: tinyinsta-config }
            - secretRef: { name: tinyinsta-secrets }
          env: [{ name: SERVICE_NAME, value: user-svc }]
          ports: [{ containerPort: 8000 }]
          readinessProbe: { httpGet: { path: /health, port: 8000 }, initialDelaySeconds: 10, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata: { name: user-svc, namespace: tinyinsta }
spec:
  selector: { app: user-svc }
  ports: [{ port: 8000, targetPort: 8000 }]
