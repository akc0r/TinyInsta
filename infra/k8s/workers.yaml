# Bus workers — Deployments only (no Service: they consume, they don't serve).
# Each reuses its service image with `python manage.py consume`; media-worker is
# its own image (worker.py is its default entrypoint).
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: post-worker, namespace: tinyinsta }
spec:
  replicas: 1
  selector: { matchLabels: { app: post-worker } }
  template:
    metadata: { labels: { app: post-worker } }
    spec:
      containers:
        - name: worker
          image: tinyinsta/post-svc:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "manage.py", "consume"]
          envFrom:
            - configMapRef: { name: tinyinsta-config }
            - secretRef: { name: tinyinsta-secrets }
          env: [{ name: SERVICE_NAME, value: post-svc }]
