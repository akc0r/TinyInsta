# Datastores — single-replica, EPHEMERAL (emptyDir) for a demonstrative cluster.
# In production use StatefulSets with PVCs, or managed services / operators.
# Service names mirror the compose hostnames so app defaults resolve unchanged.
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: postgres, namespace: tinyinsta }
spec:
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata: { labels: { app: postgres } }
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - { name: POSTGRES_USER, valueFrom: { configMapKeyRef: { name: tinyinsta-config, key: POSTGRES_USER } } }
            - { name: POSTGRES_PASSWORD, valueFrom: { secretKeyRef: { name: tinyinsta-secrets, key: POSTGRES_PASSWORD } } }
            - { name: POSTGRES_DB, valueFrom: { configMapKeyRef: { name: tinyinsta-config, key: POSTGRES_USER } } }
          ports: [{ containerPort: 5432 }]
          volumeMounts:
            - { name: init, mountPath: /docker-entrypoint-initdb.d, readOnly: true }
            - { name: data, mountPath: /var/lib/postgresql/data }
      volumes:
        - { name: init, configMap: { name: postgres-init } }
        - { name: data, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata: { name: postgres, namespace: tinyinsta }
spec:
  selector: { app: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: redis, namespace: tinyinsta }
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
        - name: redis
          image: redis:7
          ports: [{ containerPort: 6379 }]
---
apiVersion: v1
kind: Service
metadata: { name: redis, namespace: tinyinsta }
spec:
  selector: { app: redis }
  ports: [{ port: 6379, targetPort: 6379 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: redpanda, namespace: tinyinsta }
spec:
  replicas: 1
  selector: { matchLabels: { app: redpanda } }
  template:
    metadata: { labels: { app: redpanda } }
    spec:
      containers:
        - name: redpanda
          image: redpandadata/redpanda:v24.2.7
          args:
            - redpanda
            - start
            - --smp=1
            - --overprovisioned
            - --kafka-addr=PLAINTEXT://0.0.0.0:9092
            - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
          ports: [{ containerPort: 9092 }]
---
apiVersion: v1
kind: Service
metadata: { name: redpanda, namespace: tinyinsta }
spec:
  selector: { app: redpanda }
  ports: [{ port: 9092, targetPort: 9092 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: mongo, namespace: tinyinsta }
spec:
  replicas: 1
  selector: { matchLabels: { app: mongo } }
  template:
    metadata: { labels: { app: mongo } }
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports: [{ containerPort: 27017 }]
---
apiVersion: v1
kind: Service
metadata: { name: mongo, namespace: tinyinsta }
spec:
  selector: { app: mongo }
  ports: [{ port: 27017, targetPort: 27017 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: neo4j, namespace: tinyinsta }
spec:
  replicas: 1
  selector: { matchLabels: { app: neo4j } }
  template:
    metadata: { labels: { app: neo4j } }
    spec:
      containers:
        - name: neo4j
          image: neo4j:5
          env:
            - name: NEO4J_AUTH
              value: "neo4j/tinyinsta"
          ports: [{ containerPort: 7687 }]
---
apiVersion: v1
kind: Service
metadata: { name: neo4j, namespace: tinyinsta }
spec:
  selector: { app: neo4j }
  ports: [{ port: 7687, targetPort: 7687 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: minio, namespace: tinyinsta }
spec:
  replicas: 1
  selector: { matchLabels: { app: minio } }
  template:
    metadata: { labels: { app: minio } }
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - { name: MINIO_ROOT_USER, valueFrom: { secretKeyRef: { name: tinyinsta-secrets, key: S3_ACCESS_KEY } } }
            - { name: MINIO_ROOT_PASSWORD, valueFrom: { secretKeyRef: { name: tinyinsta-secrets, key: S3_SECRET_KEY } } }
          ports: [{ containerPort: 9000 }, { containerPort: 9001 }]
---
apiVersion: v1
kind: Service
metadata: { name: minio, namespace: tinyinsta }
spec:
  selector: { app: minio }
  ports:
    - { name: s3, port: 9000, targetPort: 9000 }
    - { name: console, port: 9001, targetPort: 9001 }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: elasticsearch, namespace: tinyinsta }
spec:
  replicas: 1
  selector: { matchLabels: { app: elasticsearch } }
  template:
    metadata: { labels: { app: elasticsearch } }
    spec:
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
          env:
            - { name: discovery.type, value: single-node }
            - { name: xpack.security.enabled, value: "false" }
            - { name: ES_JAVA_OPTS, value: "-Xms512m -Xmx512m" }
          ports: [{ containerPort: 9200 }]
---
apiVersion: v1
kind: Service
metadata: { name: elasticsearch, namespace: tinyinsta }
spec:
  selector: { app: elasticsearch }
  ports: [{ port: 9200, targetPort: 9200 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: keycloak, namespace: tinyinsta }
spec:
  replicas: 1
  selector: { matchLabels: { app: keycloak } }
  template:
    metadata: { labels: { app: keycloak } }
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.0
          args: ["start-dev", "--import-realm"]
          env:
            - { name: KEYCLOAK_ADMIN, value: admin }
            - { name: KEYCLOAK_ADMIN_PASSWORD, value: admin }
          ports: [{ containerPort: 8080 }]
          volumeMounts:
            - { name: realm, mountPath: /opt/keycloak/data/import, readOnly: true }
      volumes:
        - { name: realm, configMap: { name: keycloak-realm } }
---
apiVersion: v1
kind: Service
metadata: { name: keycloak, namespace: tinyinsta }
spec:
  selector: { app: keycloak }
  ports: [{ port: 8080, targetPort: 8080 }]
