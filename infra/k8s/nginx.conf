# Caching reverse proxy in front of MinIO — the "CDN" for processed media.
# Reads (thumbnails, transcodes) are cached here so repeat fetches never hit
# object storage. Uploads (presigned PUT) bypass this and go straight to MinIO,
# so this proxy is read-only by design.

proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=media_cache:10m
                 max_size=1g inactive=60m use_temp_path=off;

server {
    listen 80;
    server_name _;

    # MinIO uses path-style addressing (bucket in the path), so the upstream
    # Host is irrelevant to object resolution; the cache key is the URI.
    location / {
        proxy_pass http://minio:9000;
        proxy_set_header Host $host;

        proxy_cache media_cache;
        proxy_cache_valid 200 206 60m;
        proxy_cache_key "$request_uri";
        # Coalesce concurrent misses for the same object into one upstream fetch.
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=3600" always;

        # Only reads are cacheable; never proxy mutating verbs through the cache.
        limit_except GET HEAD {
            deny all;
        }
    }
}
