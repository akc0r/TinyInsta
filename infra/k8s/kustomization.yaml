apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tinyinsta

resources:
  - namespace.yaml
  - config.yaml
  - datastores.yaml
  - apps.yaml
  - workers.yaml
  - ingress.yaml

# Config files surfaced as ConfigMaps the pods mount. These are local copies of
# infra/{postgres,keycloak,nginx} so the overlay is self-contained (kustomize
# forbids generator sources outside its root). disableNameSuffixHash keeps stable
# names so the volume references in the manifests resolve.
generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: postgres-init
    files:
      - 01-create-databases.sql=postgres-init.sql
  - name: keycloak-realm
    files:
      - tinyinsta-realm.json
  - name: nginx-cdn-conf
    files:
      - nginx.conf
