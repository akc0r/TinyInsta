# Prometheus scrape config. Each HTTP service exposes /metrics via
# django-prometheus (see libs/tinyinsta/service/urls.py). Targets are the compose
# service names, resolved over the Docker network. Bus workers (`consume`) serve
# no HTTP and are intentionally not scraped.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: tinyinsta-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - user-svc:8000
          - post-svc:8000
          - usertimeline-svc:8000
          - hometimeline-svc:8000
          - interaction-svc:8000
          - stories-svc:8000
          - media-svc:8000
          - search-svc:8000
          - realtime-svc:8000
        labels:
          stack: tinyinsta
    relabel_configs:
      # Use the bare service name (drop :8000) as the `service` label.
      - source_labels: [__address__]
        regex: "([^:]+):.*"
        target_label: service
        replacement: "$1"
