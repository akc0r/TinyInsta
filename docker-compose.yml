# TinyInsta — root orchestration.
#
# This file launches *everything* by composing two maintainable halves:
#   - docker-compose.database.yml → infra, datastores & observability
#   - docker-compose.service.yml  → our Django/DRF application services
#
# The `include` directive merges both into a single Compose project, so
# profiles and cross-file depends_on (e.g. a service waiting on postgres)
# work exactly as before. All existing commands keep working:
#
#   docker compose --profile infra up -d
#   docker compose --profile infra --profile apps up -d
#
# Edit a half directly when changing only datastores or only services.
include:
  - docker-compose.database.yml
  - docker-compose.service.yml
