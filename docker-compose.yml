# TinyInsta — local orchestration.
# Profiles: infra | mongo | minio | neo4j | search | tools | apps (+ one per service)
#
#   docker compose --profile infra up -d
#   docker compose --profile infra --profile apps up -d
#
# Application images build with context = repo root (to bundle libs/).

# ---- Reusable YAML anchors -----------------------------------------------------
x-svc-env: &svc-env
  DJANGO_DEBUG: "${DJANGO_DEBUG:-true}"
  DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-dev-insecure-change-me}"
  POSTGRES_USER: "${POSTGRES_USER:-tinyinsta}"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-tinyinsta}"
  POSTGRES_HOST: postgres
  BUS_BOOTSTRAP_SERVERS: redpanda:9092
  # Durable, cross-replica consumer dedupe (RedisDedupeStore).
  DEDUPE_REDIS_URL: "${DEDUPE_REDIS_URL:-redis://redis:6379/0}"
  # Bounded retry + dead-letter routing for event consumers.
  BUS_MAX_ATTEMPTS: "${BUS_MAX_ATTEMPTS:-3}"
  BUS_RETRY_BACKOFF: "${BUS_RETRY_BACKOFF:-0.5}"
  OIDC_JWKS_URL: "http://keycloak:8080/realms/tinyinsta/protocol/openid-connect/certs"
  OIDC_ISSUER: "${OIDC_ISSUER:-http://localhost:8080/realms/tinyinsta}"
  OIDC_AUDIENCE: "${OIDC_AUDIENCE:-}"
  # gunicorn workers per HTTP service. 1 by default to keep the full stack within
  # a laptop Docker VM; raise (e.g. 2) where resources allow.
  WEB_CONCURRENCY: "${WEB_CONCURRENCY:-1}"

x-svc-build: &svc-build
  context: .
  # `dockerfile` is set per service below.

# One-shot DB migration for relational services. Each <svc>-migrate runs
# `manage.py migrate` once and exits; the service + its worker wait for it to
# complete successfully (depends_on: condition: service_completed_successfully),
# so the schema is always present before traffic — no manual migrate step.
x-migrate: &migrate
  command: ["python", "manage.py", "migrate", "--noinput"]
  restart: "on-failure"
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ===========================================================================
  # INFRA (profile: infra)
  # ===========================================================================
  traefik:
    image: traefik:v3.1
    profiles: ["infra"]
    command: --configFile=/etc/traefik/traefik.yml
    ports:
      - "80:80"       # API Gateway (frontend → /api/... and /ws)
      - "8090:8090"   # Traefik dashboard
    volumes:
      - ./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  postgres:
    image: postgres:16
    profiles: ["infra"]
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-tinyinsta}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-tinyinsta}"
      POSTGRES_DB: "${POSTGRES_USER:-tinyinsta}"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tinyinsta}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    profiles: ["infra"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    profiles: ["infra"]
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 15

  # Pre-create the event topics so consumers subscribe to topics that already
  # exist. Without this, a topic is created lazily on its first publish and a
  # worker that subscribed earlier only notices it on the next metadata refresh
  # (~5 min) — e.g. post.deleted would be ignored until then. Idempotent.
  redpanda-init:
    image: redpandadata/redpanda:v24.2.7
    profiles: ["infra"]
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        rpk topic create -X brokers=redpanda:9092
        user.created user.followed user.unfollowed
        user.blocked user.unblocked user.mentioned
        user.close_friend_added user.close_friend_removed
        post.created post.commented post.comment_edited post.comment_deleted
        post.deleted post.liked post.unliked
        post.saved post.unsaved post.reposted post.unreposted
        media.uploaded media.processed
        story.created story.viewed
        message.sent
        dlq.post-svc dlq.usertimeline-svc dlq.search-svc
        dlq.hometimeline-svc dlq.realtime-svc dlq.stories-svc
        dlq.media-worker dlq.ranking-svc dlq.messaging-svc || true
    restart: "no"

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    profiles: ["infra"]
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: "${KEYCLOAK_ADMIN:-admin}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD:-admin}"
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: "${POSTGRES_USER:-tinyinsta}"
      KC_DB_PASSWORD: "${POSTGRES_PASSWORD:-tinyinsta}"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy

  # ===========================================================================
  # DATASTORES (introduced incrementally via profiles)
  # ===========================================================================
  mongo:
    image: mongo:7
    profiles: ["mongo"]
    # Single-node replica set: enables multi-document transactions (the
    # transactional outbox in post-svc writes the post and its event atomically)
    # and change streams. Initialised once by the mongo-init one-shot below.
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo-init:
    image: mongo:7
    profiles: ["mongo"]
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    # Idempotent: rs.initiate() throws "already initialized" on re-run, which we
    # swallow so the one-shot can be re-applied without error.
    entrypoint:
      - bash
      - -c
      - |
        mongosh --host mongo:27017 --quiet --eval '
          try { rs.initiate({_id:"rs0",members:[{_id:0,host:"mongo:27017"}]}); }
          catch (e) { if (!/already initialized/.test(e.message)) throw e; }
        '

  minio:
    image: minio/minio:latest
    profiles: ["minio"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${S3_ACCESS_KEY:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${S3_SECRET_KEY:-minioadmin}"
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # console
    volumes:
      - minio-data:/data

  # Caching CDN in front of MinIO for media reads. Routed by Traefik on /cdn;
  # media-svc/worker hand out read URLs through it (S3_CDN_URL). Uploads bypass it.
  nginx-cdn:
    image: nginx:1.27-alpine
    profiles: ["minio"]
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cdn.rule=PathPrefix(`/cdn`)"
      - "traefik.http.routers.cdn.middlewares=cdnstrip@file,ratelimit@file"
      - "traefik.http.services.cdn.loadbalancer.server.port=80"
    depends_on:
      - minio

  neo4j:
    image: neo4j:5
    profiles: ["neo4j"]
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-tinyinsta}"
      # Bound the JVM heap + page cache so Neo4j fits a laptop Docker VM.
      NEO4J_server_memory_heap_initial__size: "256m"
      NEO4J_server_memory_heap_max__size: "512m"
      NEO4J_server_memory_pagecache_size: "256m"
    mem_limit: 1g
    ports:
      - "7474:7474"   # console
      - "7687:7687"   # bolt
    volumes:
      - neo4j-data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    profiles: ["search"]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    # 512m heap + Lucene/off-heap; capped so ES can't balloon and starve the VM.
    mem_limit: 1200m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    # ES boots slower under the heap cap; gate search-svc/worker on it being up
    # so the consumer doesn't crash-loop on "connection refused" at startup.
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  cassandra:
    image: cassandra:5
    profiles: ["cassandra"]
    environment:
      CASSANDRA_CLUSTER_NAME: tinyinsta
      # Single-node dev heap. The image otherwise auto-sizes off-heap *direct*
      # memory to ~1.4G (from the VM's total RAM), which alone blows past any
      # sane mem_limit and gets the container OOM-killed — so we pin both the
      # heap and MaxDirectMemorySize. Total stays well under mem_limit below.
      MAX_HEAP_SIZE: "512M"
      HEAP_NEWSIZE: "100M"
      JVM_EXTRA_OPTS: "-XX:MaxDirectMemorySize=512M"
    # Ceiling for heap (512M) + direct (512M) + JVM overhead (~250M). Fits a 6 GB
    # Docker VM next to the other stores; raise it (and the two sizes) with more RAM.
    mem_limit: 1400m
    ports:
      - "9042:9042"
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  redpanda-console:            # tools profile (optional)
    image: redpandadata/console:v2.7.2
    profiles: ["tools"]
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8085:8080"
    depends_on:
      - redpanda

  # ===========================================================================
  # OBSERVABILITY (profile: observability)
  #   Prometheus + Grafana for metrics; Filebeat + Kibana for the JSON logs.
  #   Kibana reuses the `search` Elasticsearch — start it alongside:
  #     docker compose --profile search --profile observability up -d
  # ===========================================================================
  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ["observability"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.15.0
    profiles: ["observability"]
    user: root
    command: ["filebeat", "-e", "-strict.perms=false"]
    volumes:
      - ./infra/observability/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    profiles: ["observability"]
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch:9200"
    ports:
      - "5601:5601"

  # ===========================================================================
  # APPLICATION SERVICES (profile: apps, + one profile per service)
  # ===========================================================================
  user-svc-migrate:
    <<: *migrate
    image: tinyinsta/user-svc
    profiles: ["apps", "user-svc"]
    environment:
      <<: *svc-env
      SERVICE_NAME: user-svc
  user-svc:
    build: { <<: *svc-build, dockerfile: services/user-svc/Dockerfile }
    image: tinyinsta/user-svc
    profiles: ["apps", "user-svc"]
    depends_on:
      user-svc-migrate:
        condition: service_completed_successfully
    environment:
      <<: *svc-env
      SERVICE_NAME: user-svc
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-tinyinsta}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.users.rule=PathPrefix(`/api/users`)"
      - "traefik.http.routers.users.middlewares=apistrip@file,ratelimit@file"

  post-svc:
    build: { <<: *svc-build, dockerfile: services/post-svc/Dockerfile }
    image: tinyinsta/post-svc
    profiles: ["apps", "post-svc"]
    environment:
      <<: *svc-env
      SERVICE_NAME: post-svc
      MONGO_URI: "mongodb://mongo:27017/?replicaSet=rs0"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.posts.rule=PathPrefix(`/api/posts`)"
      - "traefik.http.routers.posts.middlewares=apistrip@file,ratelimit@file"
  post-worker:
    image: tinyinsta/post-svc
    profiles: ["apps", "post-svc"]
    command: python manage.py consume
    environment:
      <<: *svc-env
      SERVICE_NAME: post-svc
      MONGO_URI: "mongodb://mongo:27017/?replicaSet=rs0"
    depends_on: [post-svc]
  # Transactional-outbox relay: publishes events committed alongside the post
  # write to the bus. Separate process so the API never publishes inline.
  post-outbox-relay:
    image: tinyinsta/post-svc
    profiles: ["apps", "post-svc"]
    command: python manage.py outbox_relay
    environment:
      <<: *svc-env
      SERVICE_NAME: post-svc
      MONGO_URI: "mongodb://mongo:27017/?replicaSet=rs0"
    depends_on: [post-svc]

  usertimeline-svc:
    build: { <<: *svc-build, dockerfile: services/usertimeline-svc/Dockerfile }
    image: tinyinsta/usertimeline-svc
    profiles: ["apps", "usertimeline-svc"]
    environment:
      <<: *svc-env
      SERVICE_NAME: usertimeline-svc
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.usertimeline.rule=PathPrefix(`/api/usertimeline`)"
      - "traefik.http.routers.usertimeline.middlewares=apistrip@file,ratelimit@file"
  usertimeline-worker:
    image: tinyinsta/usertimeline-svc
    profiles: ["apps", "usertimeline-svc"]
    command: python manage.py consume
    environment:
      <<: *svc-env
      SERVICE_NAME: usertimeline-svc
    depends_on: [usertimeline-svc]

  hometimeline-svc:
    build: { <<: *svc-build, dockerfile: services/hometimeline-svc/Dockerfile }
    image: tinyinsta/hometimeline-svc
    profiles: ["apps", "hometimeline-svc"]
    environment:
      <<: *svc-env
      SERVICE_NAME: hometimeline-svc
      USERTIMELINE_URL: "http://usertimeline-svc:8000"
      # Algorithmic feed re-rank via ranking-svc (chronological if off/unreachable).
      RANKING_ENABLED: "${RANKING_ENABLED:-true}"
      RANKING_URL: "http://ranking-svc:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.home.rule=PathPrefix(`/api/home`)"
      - "traefik.http.routers.home.middlewares=apistrip@file,ratelimit@file"
  hometimeline-worker:
    image: tinyinsta/hometimeline-svc
    profiles: ["apps", "hometimeline-svc"]
    command: python manage.py consume
    environment:
      <<: *svc-env
      SERVICE_NAME: hometimeline-svc
      USERTIMELINE_URL: "http://usertimeline-svc:8000"
    depends_on: [hometimeline-svc]

  # Algorithmic ranking read model. Internal only (no Traefik route): scored
  # server-to-server by hometimeline-svc at feed-read time.
  ranking-svc:
    build: { <<: *svc-build, dockerfile: services/ranking-svc/Dockerfile }
    image: tinyinsta/ranking-svc
    profiles: ["apps", "ranking-svc"]
    environment:
      <<: *svc-env
      SERVICE_NAME: ranking-svc
  ranking-worker:
    image: tinyinsta/ranking-svc
    profiles: ["apps", "ranking-svc"]
    command: python manage.py consume
    environment:
      <<: *svc-env
      SERVICE_NAME: ranking-svc
    depends_on: [ranking-svc]

  # Direct messages, backed by Cassandra (write-heavy, time-ordered).
  messaging-svc:
    build: { <<: *svc-build, dockerfile: services/messaging-svc/Dockerfile }
    image: tinyinsta/messaging-svc
    profiles: ["apps", "messaging-svc"]
    environment:
      <<: *svc-env
      SERVICE_NAME: messaging-svc
      CASSANDRA_HOSTS: cassandra
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.messaging.rule=PathPrefix(`/api/messaging`)"
      - "traefik.http.routers.messaging.middlewares=apistrip@file,ratelimit@file"
  # One-shot: create the Cassandra keyspace/tables before the API serves traffic.
  messaging-init:
    image: tinyinsta/messaging-svc
    profiles: ["apps", "messaging-svc"]
    command: python manage.py init_cassandra
    environment:
      <<: *svc-env
      SERVICE_NAME: messaging-svc
      CASSANDRA_HOSTS: cassandra
    restart: "on-failure"
    depends_on: [messaging-svc]

  interaction-svc-migrate:
    <<: *migrate
    image: tinyinsta/interaction-svc
    profiles: ["apps", "interaction-svc"]
    environment:
      <<: *svc-env
      SERVICE_NAME: interaction-svc
  interaction-svc:
    build: { <<: *svc-build, dockerfile: services/interaction-svc/Dockerfile }
    image: tinyinsta/interaction-svc
    profiles: ["apps", "interaction-svc"]
    depends_on:
      interaction-svc-migrate:
        condition: service_completed_successfully
    environment:
      <<: *svc-env
      SERVICE_NAME: interaction-svc
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.interactions.rule=PathPrefix(`/api/interactions`)"
      - "traefik.http.routers.interactions.middlewares=apistrip@file,ratelimit@file"

  stories-svc-migrate:
    <<: *migrate
    image: tinyinsta/stories-svc
    profiles: ["apps", "stories-svc"]
    environment:
      <<: *svc-env
      SERVICE_NAME: stories-svc
  stories-svc:
    build: { <<: *svc-build, dockerfile: services/stories-svc/Dockerfile }
    image: tinyinsta/stories-svc
    profiles: ["apps", "stories-svc"]
    depends_on:
      stories-svc-migrate:
        condition: service_completed_successfully
    environment:
      <<: *svc-env
      SERVICE_NAME: stories-svc
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stories.rule=PathPrefix(`/api/stories`)"
      - "traefik.http.routers.stories.middlewares=apistrip@file,ratelimit@file"
  stories-worker:
    image: tinyinsta/stories-svc
    profiles: ["apps", "stories-svc"]
    command: python manage.py consume
    environment:
      <<: *svc-env
      SERVICE_NAME: stories-svc
    depends_on: [stories-svc]

  media-svc:
    build: { <<: *svc-build, dockerfile: services/media-svc/Dockerfile }
    image: tinyinsta/media-svc
    profiles: ["apps", "media-svc"]
    environment:
      <<: *svc-env
      SERVICE_NAME: media-svc
      MONGO_URI: "mongodb://mongo:27017/?replicaSet=rs0"
      MONGO_DB: media_svc
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY:-minioadmin}"
      S3_SECRET_KEY: "${S3_SECRET_KEY:-minioadmin}"
      S3_BUCKET: "${S3_BUCKET:-media}"
      S3_PUBLIC_URL: "${S3_PUBLIC_URL:-http://localhost:9000}"
      S3_CDN_URL: "${S3_CDN_URL:-http://localhost/cdn}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.media.rule=PathPrefix(`/api/media`)"
      - "traefik.http.routers.media.middlewares=apistrip@file,ratelimit@file"

  media-worker:
    build: { <<: *svc-build, dockerfile: services/media-worker/Dockerfile }
    image: tinyinsta/media-worker
    profiles: ["apps", "media-worker"]
    environment:
      <<: *svc-env
      SERVICE_NAME: media-worker
      MONGO_URI: "mongodb://mongo:27017/?replicaSet=rs0"
      MONGO_DB: media_svc
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY:-minioadmin}"
      S3_SECRET_KEY: "${S3_SECRET_KEY:-minioadmin}"
      S3_BUCKET: "${S3_BUCKET:-media}"
      S3_PUBLIC_URL: "${S3_PUBLIC_URL:-http://localhost:9000}"
      S3_CDN_URL: "${S3_CDN_URL:-http://localhost/cdn}"

  search-svc:
    build: { <<: *svc-build, dockerfile: services/search-svc/Dockerfile }
    image: tinyinsta/search-svc
    profiles: ["apps", "search-svc"]
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      <<: *svc-env
      SERVICE_NAME: search-svc
      ELASTICSEARCH_URL: "http://elasticsearch:9200"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.search.rule=PathPrefix(`/api/search`) || PathPrefix(`/api/explore`) || PathPrefix(`/api/hashtags`)"
      - "traefik.http.routers.search.middlewares=apistrip@file,ratelimit@file"
  search-worker:
    image: tinyinsta/search-svc
    profiles: ["apps", "search-svc"]
    command: python manage.py consume
    environment:
      <<: *svc-env
      SERVICE_NAME: search-svc
      ELASTICSEARCH_URL: "http://elasticsearch:9200"
    depends_on: [search-svc]

  realtime-svc-migrate:
    <<: *migrate
    image: tinyinsta/realtime-svc
    profiles: ["apps", "realtime-svc"]
    environment:
      <<: *svc-env
      SERVICE_NAME: realtime-svc
  realtime-svc:
    build: { <<: *svc-build, dockerfile: services/realtime-svc/Dockerfile }
    image: tinyinsta/realtime-svc
    profiles: ["apps", "realtime-svc"]
    depends_on:
      realtime-svc-migrate:
        condition: service_completed_successfully
    environment:
      <<: *svc-env
      SERVICE_NAME: realtime-svc
    labels:
      - "traefik.enable=true"
      # Notifications REST (/api prefix stripped)
      - "traefik.http.routers.notifications.rule=PathPrefix(`/api/notifications`)"
      - "traefik.http.routers.notifications.middlewares=apistrip@file,ratelimit@file"
      - "traefik.http.routers.notifications.service=realtime-svc"
      # WebSocket (no strip)
      - "traefik.http.routers.ws.rule=PathPrefix(`/ws`)"
      - "traefik.http.routers.ws.service=realtime-svc"
      - "traefik.http.services.realtime-svc.loadbalancer.server.port=8000"
  realtime-worker:
    image: tinyinsta/realtime-svc
    profiles: ["apps", "realtime-svc"]
    command: python manage.py consume
    environment:
      <<: *svc-env
      SERVICE_NAME: realtime-svc
    depends_on: [realtime-svc]

